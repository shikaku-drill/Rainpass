<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
    <meta name="theme-color" content="#f5efe6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ENSEI PASS">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
</head>
<body>
    <div class="aura-bg" aria-hidden="true">
        <div class="ao ao-1"></div>
        <div class="ao ao-2"></div>
        <div class="ao ao-3"></div>
    </div>
    <div id="toast" role="status" aria-live="polite"></div>
    
    <nav class="tn">
        <a href="#" class="tn-logo" onclick="switchTab('home');return false;">

        </a>
        <span class="tn-cd" id="navCountdown" onclick="switchTab('home')">——</span>
    </nav>

    <div class="tw">
        <div class="tp active" id="tp-home"></div>
        <div class="tp" id="tp-go"></div>
        <div class="tp" id="tp-live"></div>
        <div class="tp" id="tp-pack"></div>
        <div class="tp" id="tp-me"></div>
    </div>

    <nav class="bn">
        <button class="bi active" id="bn-home" onclick="switchTab('home')"><div class="bii">🏠</div><span>HOME</span></button>
        <button class="bi" id="bn-go" onclick="switchTab('go')"><div class="bii">🚌</div><span>GO</span></button>
        <button class="bi" id="bn-live" onclick="switchTab('live')"><div class="bii">🎤</div><span>LIVE</span></button>
        <button class="bi" id="bn-pack" onclick="switchTab('pack')"><div class="bii">🎒</div><span>PACK</span></button>
        <button class="bi" id="bn-me" onclick="switchTab('me')"><div class="bii">⚡</div><span>ME</span></button>
    </nav>

    <script src="script.js"></script>

</html>
